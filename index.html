<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Interactive Radar</title>

<style>

/* ===== RESET ===== */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

body{
    background: radial-gradient(circle at center,#031a12,#000);
    color:#00ffa6;
    height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}

/* ===== APP LAYOUT ===== */
.app{
    width:min(95vw,600px);
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:15px;
}

/* ===== RADAR WRAPPER (FOR PERFECT CIRCLE) ===== */
.radar-wrapper{
    position:relative;
    width:100%;
    aspect-ratio:1/1; /* FIXES OVAL ISSUE */
    border-radius:50%;
    box-shadow:
        0 0 40px #00ffa644,
        inset 0 0 80px #00ffa622;
}

canvas{
    width:100%;
    height:100%;
    border-radius:50%;
    background: radial-gradient(circle,#002015,#000 85%);
}

/* ===== HUD PANEL ===== */
.panel{
    width:100%;
    background:rgba(0,0,0,0.45);
    border:1px solid #00ffa633;
    border-radius:14px;
    padding:12px;
    backdrop-filter:blur(10px);
    display:flex;
    justify-content:space-between;
    align-items:center;
}

button{
    background:#001c14;
    color:#00ffa6;
    border:1px solid #00ffa655;
    padding:8px 14px;
    border-radius:8px;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#003826;
    box-shadow:0 0 10px #00ffa666;
}

.title{
    font-weight:600;
    letter-spacing:2px;
    opacity:.9;
    text-align:center;
}

.stats{
    font-size:14px;
    opacity:.8;
}

/* MOBILE TEXT SCALE */
@media(max-width:500px){
    .title{font-size:14px;}
}

</style>
</head>

<body>

<div class="app">

<div class="title">RADAR CONTROL SYSTEM</div>

<div class="radar-wrapper">
<canvas id="radar"></canvas>
</div>

<div class="panel">
<div class="stats" id="stats">Targets: 0</div>
<button onclick="clearTargets()">Clear Targets</button>
</div>

</div>

<script>
const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");

function resizeCanvas(){
    const size = canvas.clientWidth;
    canvas.width = size;
    canvas.height = size;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let angle = 0;
let targets = [];

function center(){
    return {
        x: canvas.width/2,
        y: canvas.height/2,
        r: canvas.width/2 - 10
    };
}

/* ===== GRID ===== */
function drawGrid(){
    const c = center();

    ctx.strokeStyle="rgba(0,255,166,0.25)";
    ctx.lineWidth=1;

    for(let i=1;i<=4;i++){
        ctx.beginPath();
        ctx.arc(c.x,c.y,c.r*(i/4),0,Math.PI*2);
        ctx.stroke();
    }

    for(let i=0;i<360;i+=30){
        let rad=i*Math.PI/180;
        ctx.beginPath();
        ctx.moveTo(c.x,c.y);
        ctx.lineTo(
            c.x+Math.cos(rad)*c.r,
            c.y+Math.sin(rad)*c.r
        );
        ctx.stroke();
    }
}

/* ===== SWEEP ===== */
function drawSweep(){
    const c=center();

    const grad=ctx.createRadialGradient(
        c.x,c.y,0,
        c.x,c.y,c.r
    );

    grad.addColorStop(0,"rgba(0,255,166,.35)");
    grad.addColorStop(1,"rgba(0,255,166,0)");

    ctx.fillStyle=grad;

    ctx.beginPath();
    ctx.moveTo(c.x,c.y);
    ctx.arc(c.x,c.y,c.r,angle,angle+0.35);
    ctx.closePath();
    ctx.fill();
}

/* ===== TARGETS ===== */
function drawTargets(){
    targets.forEach(t=>{
        t.pulse+=0.07;

        ctx.beginPath();
        ctx.arc(t.x,t.y,4+Math.sin(t.pulse)*2,0,Math.PI*2);
        ctx.fillStyle="#00ffa6";
        ctx.shadowBlur=15;
        ctx.shadowColor="#00ffa6";
        ctx.fill();
        ctx.shadowBlur=0;
    });
}

/* ===== FADE TRAIL ===== */
function fade(){
    ctx.fillStyle="rgba(0,15,10,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* ===== INTERACTION (TAP TO ADD TARGET) ===== */
canvas.addEventListener("pointerdown",e=>{
    const rect=canvas.getBoundingClientRect();

    targets.push({
        x:e.clientX-rect.left,
        y:e.clientY-rect.top,
        pulse:0
    });

    updateStats();
});

/* ===== CLEAR ===== */
function clearTargets(){
    targets=[];
    updateStats();
}

function updateStats(){
    document.getElementById("stats").innerText =
        "Targets: " + targets.length;
}

/* ===== LOOP ===== */
function animate(){
    fade();
    drawGrid();
    drawTargets();
    drawSweep();

    angle+=0.02;
    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
