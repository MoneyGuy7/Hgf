<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radar System</title>

<style>
/* ===== GLOBAL ===== */
body {
    margin: 0;
    background: radial-gradient(circle at center, #02140a, #000);
    font-family: "Segoe UI", sans-serif;
    color: #00ff9d;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* ===== RADAR CONTAINER ===== */
.radar-container {
    position: relative;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    box-shadow:
        0 0 40px #00ff9d55,
        inset 0 0 60px #00ff9d22;
}

/* ===== CANVAS ===== */
canvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    background: radial-gradient(circle, #001b0e 0%, #000 80%);
}

/* ===== HUD TEXT ===== */
.hud {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 14px;
    opacity: 0.8;
    letter-spacing: 2px;
}

.footer {
    position: absolute;
    bottom: 20px;
    right: 20px;
    font-size: 12px;
    opacity: 0.6;
}
</style>
</head>

<body>

<div class="radar-container">
    <canvas id="radar"></canvas>

    <div class="hud">
        RADAR SYSTEM<br>
        STATUS: ACTIVE
    </div>

    <div class="footer">
        GitHub Pages Radar UI
    </div>
</div>

<script>
const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");

canvas.width = 600;
canvas.height = 600;

const centerX = canvas.width / 2;
const centerY = canvas.height / 2;
const radius = 280;

let angle = 0;

/* ===== TARGETS ===== */
const targets = [];

for (let i = 0; i < 12; i++) {
    targets.push({
        r: Math.random() * radius,
        theta: Math.random() * Math.PI * 2,
        pulse: Math.random()
    });
}

/* ===== DRAW GRID ===== */
function drawGrid() {

    ctx.strokeStyle = "rgba(0,255,157,0.25)";
    ctx.lineWidth = 1;

    // circles
    for (let i = 1; i <= 4; i++) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, radius * (i/4), 0, Math.PI * 2);
        ctx.stroke();
    }

    // lines
    for (let i = 0; i < 360; i += 30) {
        const rad = i * Math.PI/180;

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(
            centerX + Math.cos(rad)*radius,
            centerY + Math.sin(rad)*radius
        );
        ctx.stroke();
    }
}

/* ===== RADAR SWEEP ===== */
function drawSweep() {
    const sweepWidth = 0.35;

    const grad = ctx.createRadialGradient(
        centerX, centerY, 0,
        centerX, centerY, radius
    );

    grad.addColorStop(0, "rgba(0,255,157,0.4)");
    grad.addColorStop(1, "rgba(0,255,157,0)");

    ctx.fillStyle = grad;

    ctx.beginPath();
    ctx.moveTo(centerX, centerY);
    ctx.arc(
        centerX,
        centerY,
        radius,
        angle,
        angle + sweepWidth
    );
    ctx.closePath();
    ctx.fill();
}

/* ===== TARGET BLIPS ===== */
function drawTargets() {

    targets.forEach(t => {

        const x = centerX + Math.cos(t.theta)*t.r;
        const y = centerY + Math.sin(t.theta)*t.r;

        t.pulse += 0.05;
        const size = 3 + Math.sin(t.pulse)*1.5;

        ctx.beginPath();
        ctx.arc(x, y, size, 0, Math.PI*2);
        ctx.fillStyle = "#00ff9d";
        ctx.shadowBlur = 15;
        ctx.shadowColor = "#00ff9d";
        ctx.fill();
        ctx.shadowBlur = 0;
    });
}

/* ===== FADE EFFECT ===== */
function fade() {
    ctx.fillStyle = "rgba(0,10,5,0.25)";
    ctx.fillRect(0,0,canvas.width,canvas.height);
}

/* ===== MAIN LOOP ===== */
function animate() {

    fade();
    drawGrid();
    drawTargets();
    drawSweep();

    angle += 0.02;

    requestAnimationFrame(animate);
}

animate();
</script>

</body>
</html>
